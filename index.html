<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Content-Security-Policy (P2.1).
      - script-src includes 'wasm-unsafe-eval' because pmtiles + maplibre-gl
        instantiate WebAssembly modules at runtime (vector-tile decoder).
      - worker-src allows blob: because pmtiles spawns its tile worker
        from a blob URL.
      - style-src needs 'unsafe-inline' because maplibre-gl injects its
        stylesheet via a <style> tag at runtime.
      - img-src + connect-src whitelist Mapbox tile / style / geocoding
        endpoints (data: covers the inline favicon and any base64 icons).
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https://api.mapbox.com https://*.tiles.mapbox.com https://*.mapbox.com; connect-src 'self' https://api.mapbox.com https://*.tiles.mapbox.com https://*.mapbox.com; style-src 'self' 'unsafe-inline'; script-src 'self' 'wasm-unsafe-eval'; worker-src 'self' blob:; font-src 'self';" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%232F5D3A'/%3E%3Cpath d='M3 11l3-5 3 4 4-6' stroke='%23FDFAF0' stroke-width='1.6' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FVG Landslide Susceptibility</title>
    <meta name="description" content="Friuli-Venezia Giulia landslide susceptibility map · J.2 + J.3 + IFFI ground truth" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
