name: Deploy
on:
  push: { branches: [main] }
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency: { group: pages, cancel-in-progress: true }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci

      # roads_fvg.geojson + trails_fvg.geojson are gitignored (35-38 MB
      # each, OSM-derived). Every other static asset lives in the repo.
      # We bake them at deploy time so first-time visitors see road and
      # trail overlays without anyone running `npm run build:roads`
      # locally. Cache keyed on the script's content + lockfile — when
      # the script genuinely changes, Overpass gets re-queried.
      - id: roads-cache
        uses: actions/cache@v4
        with:
          path: |
            public/data/roads_fvg.geojson
            public/data/trails_fvg.geojson
          key: roads-v1-${{ hashFiles('scripts/build-roads.mjs', 'package-lock.json') }}

      # Overpass is rate-limited and flaky; the script retries across 3
      # mirrors. If all 3 are down the deploy fails fast — preferable
      # to shipping a map with no roads.
      - if: steps.roads-cache.outputs.cache-hit != 'true'
        run: npm run build:roads

      - run: VITE_BASE=/landslide-app/ VITE_MAPBOX_TOKEN=${{ secrets.MAPBOX_TOKEN }} npm run build
      - uses: actions/upload-pages-artifact@v3
        with: { path: dist }

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
